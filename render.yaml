services:
  - type: web
    name: apertura-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu &&
      pip install -e . &&
      pip install python-multipart langfuse langgraph anthropic modal "colpali-engine==0.3.9" "transformers>=4.50.0,<4.51.0"
    startCommand: uvicorn apertura.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MODAL
        value: "true"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false