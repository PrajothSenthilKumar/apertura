# kind cluster configuration for local Kubernetes demo
# Usage: kind create cluster --config k8s/kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: apertura
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30000
        hostPort: 8000
        protocol: TCP
