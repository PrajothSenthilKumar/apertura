# Copy this file to secret.yaml, fill in your values, and apply.
# DO NOT commit secret.yaml to git — it is in .gitignore.
#
# Usage:
#   cp k8s/secret.template.yaml k8s/secret.yaml
#   # edit secret.yaml with your base64-encoded values
#   kubectl apply -f k8s/secret.yaml -n apertura

apiVersion: v1
kind: Secret
metadata:
  name: apertura-secrets
  namespace: apertura
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-your-key-here"
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
