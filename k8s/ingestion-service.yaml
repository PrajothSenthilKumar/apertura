apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: apertura
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: apertura/ingestion-service:latest
          imagePullPolicy: Never   # use local image with kind load docker-image
          ports:
            - containerPort: 8001
          env:
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: COLPALI_MODEL
              value: "vidore/colqwen2.5-v0.2"
            - name: EMBED_BATCH_SIZE
              value: "1"
          envFrom:
            - secretRef:
                name: apertura-secrets
          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: apertura
spec:
  selector:
    app: ingestion-service
  ports:
    - port: 8001
      targetPort: 8001
