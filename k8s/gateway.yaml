apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: apertura
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: apertura/gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: INGESTION_SERVICE_URL
              value: "http://ingestion-service:8001"
            - name: QUERY_SERVICE_URL
              value: "http://query-service:8002"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: apertura
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: NodePort   # exposes on localhost via kind port mapping
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apertura-ingress
  namespace: apertura
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: apertura.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
